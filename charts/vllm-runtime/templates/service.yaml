apiVersion: v1
kind: Service
metadata:
  name: {{ include "vllm-runtime.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "vllm-runtime.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "vllm-runtime.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8000
      targetPort: http
