apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-runtime-gateway
  namespace: ai-runtime
  labels:
    app.kubernetes.io/name: ai-runtime-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-runtime-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-runtime-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: ghcr.io/justrunme/ai-runtime-platform:0.1.0
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-runtime-gateway
  namespace: ai-runtime
  labels:
    app.kubernetes.io/name: ai-runtime-gateway
spec:
  selector:
    app.kubernetes.io/name: ai-runtime-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
