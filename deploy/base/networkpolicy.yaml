apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-runtime-gateway
  namespace: ai-runtime
  labels:
    app.kubernetes.io/name: ai-runtime-gateway
# Starting policy: ingress only on the gateway port, egress restricted to model
# backends, the OTLP collector, and cluster DNS. Tighten the selectors per cluster.
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ai-runtime-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: http
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 8000
          protocol: TCP
    - to:
        - namespaceSelector: {}
      ports:
        - port: 4318
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
