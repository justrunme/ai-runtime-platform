name: ai-runtime-local

services:
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.13.4}
    dns:
      - ${LOCAL_DEMO_DNS_PRIMARY:-1.1.1.1}
      - ${LOCAL_DEMO_DNS_SECONDARY:-8.8.8.8}
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 24

  ollama-init:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.13.4}
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull $$OLLAMA_MODEL"]
    restart: "no"

  gateway:
    build:
      context: ../..
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      MODEL_TARGETS: "{}"
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  ollama-models:
