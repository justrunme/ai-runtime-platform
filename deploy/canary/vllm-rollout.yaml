# Alternative deployment mode for a vLLM runtime. Do not use this together with the Helm Deployment.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: qwen-vllm-canary
  namespace: ai-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: qwen-vllm-canary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen-vllm-canary
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.13.0
          args: ["--model=Qwen/Qwen2.5-7B-Instruct", "--served-model-name=qwen2.5-7b-instruct"]
          resources:
            limits:
              nvidia.com/gpu: "1"
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: {duration: 5m}
        - setWeight: 50
        - pause: {duration: 10m}
