apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-runtime-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/justrunme/ai-runtime-platform.git
    targetRevision: main
    path: deploy/base
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-runtime
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
